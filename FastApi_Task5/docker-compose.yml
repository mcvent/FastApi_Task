services:
  app:
    build:
      context: .
      dockerfile: docker/DockerFile
    container_name: fastapi-blog-app
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      # Монтируем код для разработки (горячая перезагрузка)
      - ./fastapi_app:/app/fastapi_app
      # Монтируем .env
      - ./.env:/app/.env
      - ./db.sqlite3:/app/db.sqlite3
      - ./fastapi_app/static/images:/app/static/images
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./db.sqlite3
      - PYTHONPATH=/app/fastapi_app
    restart: unless-stopped
    command: uvicorn fastapi_app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app-network

networks:
  app-network:
    driver: bridge